<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Messages -- Tha Artist Portal</title>
  <link rel='stylesheet' href='style.css'>
  <style>
    .msg-layout { display:grid; grid-template-columns:280px 1fr; height:calc(100vh - 70px); }
    .conv-list { border-right:1px solid #222; overflow-y:auto; }
    .conv-item { padding:16px; border-bottom:1px solid #1a1a1a; cursor:pointer;
      display:flex; gap:12px; align-items:center; }
    .conv-item:hover, .conv-item.active { background:#1a1a1a; }
    .conv-avatar { width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,#B8860B,#D4AF37);
      display:flex; align-items:center; justify-content:center;
      color:#000; font-weight:bold; font-size:0.9rem; flex-shrink:0; }
    .conv-name { color:#eee; font-weight:500; font-size:0.9rem; }
    .conv-preview { color:#666; font-size:0.8rem; margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:160px; }
    .conv-unread { background:#B71C1C; color:#fff; border-radius:50%;
      width:18px; height:18px; font-size:0.65rem; font-weight:bold;
      display:flex; align-items:center; justify-content:center; margin-left:auto; }
    .chat-panel { display:flex; flex-direction:column; }
    .chat-header { padding:16px 20px; border-bottom:1px solid #222;
      background:#1a1a1a; display:flex; align-items:center; gap:12px; }
    .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex;
      flex-direction:column; gap:12px; }
    .msg-bubble { max-width:70%; padding:10px 14px; border-radius:12px; font-size:0.9rem; }
    .msg-sent { background:#B8860B; color:#000; align-self:flex-end; border-radius:12px 12px 4px 12px; }
    .msg-received { background:#1a1a1a; color:#eee; align-self:flex-start;
      border:1px solid #333; border-radius:12px 12px 12px 4px; }
    .msg-time { font-size:0.7rem; color:#666; margin-top:4px; }
    .chat-input-row { padding:16px; border-top:1px solid #222;
      display:flex; gap:10px; background:#111; }
    .chat-input { flex:1; background:#222; border:1px solid #444;
      border-radius:6px; padding:10px 14px; color:#eee; font-size:0.9rem; }
    .chat-input:focus { outline:none; border-color:#D4AF37; }
    .no-conv { display:flex; align-items:center; justify-content:center;
      height:100%; color:#555; font-style:italic; font-size:1rem; }
    @media(max-width:768px) {
      .msg-layout { grid-template-columns:1fr; }
      .conv-list { height:200px; border-right:none; border-bottom:1px solid #222; }
    }
  </style>
</head>
<body class='dashboard-body'>


  <header class='dash-header'>
    <div>
      <h1 class='portal-title small'>Tha Artist Portal</h1>
      <p style='color:#888; font-size:0.85rem;'>Messages</p>
    </div>
    <div style='display:flex; gap:10px;'>
      <a href='dashboard.html' class='update-profile-btn'
         style='text-decoration:none; display:flex; align-items:center;'>
         &#8592; Dashboard</a>
      <button class='logout-btn' onclick='logout()'>Logout</button>
    </div>
  </header>


  <div class='msg-layout'>
    <!-- Conversation list -->
    <div class='conv-list' id='convList'>
      <div style='padding:16px; color:#555; font-style:italic;'>Loading...</div>
    </div>
    <!-- Chat panel -->
    <div class='chat-panel' id='chatPanel'>
      <div class='no-conv'>Select a conversation to start messaging</div>
    </div>
  </div>


  <script src='app.js'></script>
  <footer style='text-align:center; padding:10px; color:#333; font-size:0.7rem;'>
    &copy; 2026 B.B.A LLC. All Rights Reserved.</footer>
</body>
</html>
