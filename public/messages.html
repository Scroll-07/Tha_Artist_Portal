<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages -- Tha Artist Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .msg-layout { display:grid; grid-template-columns:300px 1fr; height:calc(100vh - 70px); }
    .msg-sidebar { border-right:1px solid #222; overflow-y:auto; display:flex; flex-direction:column; }
    .msg-tabs { display:flex; border-bottom:1px solid #222; }
    .msg-tab { flex:1; padding:12px; text-align:center; cursor:pointer;
      color:#666; font-size:0.85rem; font-weight:500; border:none;
      background:transparent; transition:all 0.2s; }
    .msg-tab.active { color:#D4AF37; border-bottom:2px solid #D4AF37; }
    .msg-tab:hover { color:#eee; }
    .tab-content-msg { display:none; flex:1; overflow-y:auto; }
    .tab-content-msg.active { display:block; }
    .conv-item { padding:16px; border-bottom:1px solid #1a1a1a; cursor:pointer;
      display:flex; gap:12px; align-items:center; transition:background 0.15s; }
    .conv-item:hover, .conv-item.active { background:#1a1a1a; }
    .conv-avatar { width:40px; height:40px; border-radius:50%;
      background:linear-gradient(135deg,#B8860B,#D4AF37);
      display:flex; align-items:center; justify-content:center;
      color:#000; font-weight:bold; font-size:0.9rem; flex-shrink:0; }
    .conv-name { color:#eee; font-weight:500; font-size:0.9rem; }
    .conv-unread { background:#B71C1C; color:#fff; border-radius:50%;
      width:18px; height:18px; font-size:0.65rem; font-weight:bold;
      display:flex; align-items:center; justify-content:center; margin-left:auto; }
    .req-card { padding:16px; border-bottom:1px solid #1a1a1a; }
    .req-name { color:#eee; font-weight:600; font-size:0.9rem; margin-bottom:4px; }
    .req-role { color:#666; font-size:0.78rem; margin-bottom:6px; }
    .req-msg { color:#aaa; font-size:0.82rem; margin-bottom:8px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .req-status { display:inline-block; padding:2px 10px; border-radius:12px;
      font-size:0.72rem; font-weight:bold; }
    .req-btns { display:flex; gap:8px; margin-top:10px; }
    .req-btns button { flex:1; padding:6px; border:none; border-radius:6px;
      cursor:pointer; font-size:0.8rem; font-weight:bold; }
    .chat-panel { display:flex; flex-direction:column; }
    .chat-header { padding:16px 20px; border-bottom:1px solid #222;
      background:#1a1a1a; display:flex; align-items:center; gap:12px; }
    .chat-messages { flex:1; overflow-y:auto; padding:20px;
      display:flex; flex-direction:column; gap:12px; }
    .msg-bubble { max-width:70%; padding:10px 14px; border-radius:12px; font-size:0.9rem; }
    .msg-sent { background:#B8860B; color:#000; align-self:flex-end;
      border-radius:12px 12px 4px 12px; }
    .msg-received { background:#1a1a1a; color:#eee; align-self:flex-start;
      border:1px solid #333; border-radius:12px 12px 12px 4px; }
    .msg-time { font-size:0.7rem; color:#666; margin-top:4px; }
.chat-input-row { 
  padding:12px 16px; 
  border-top:1px solid #222;
  display:flex; 
  gap:10px; 
  background:#111;
  align-items:flex-end;
}
.chat-input { 
  flex:1; 
  background:#222; 
  border:1px solid #444;
  border-radius:8px; 
  padding:10px 14px; 
  color:#eee; 
  font-size:0.9rem;
  min-height:44px;
  max-height:120px;
  resize:none;
  line-height:1.4;
}
.chat-input:focus { outline:none; border-color:#D4AF37; }
.chat-send-btn {
  background:#B8860B;
  color:#000;
  border:none;
  border-radius:8px;
  padding:10px 20px;
  cursor:pointer;
  font-weight:bold;
  font-size:0.9rem;
  flex-shrink:0;
  white-space:nowrap;
  min-width:80px;
  max-width:100px;
}
.chat-send-btn:hover { background:#D4AF37; }
    .no-conv { display:flex; align-items:center; justify-content:center;
      height:100%; color:#555; font-style:italic; font-size:1rem;
      flex-direction:column; gap:12px; }
    .empty-sidebar { padding:20px; color:#555; font-style:italic;
      font-size:0.85rem; text-align:center; }
    .tab-badge { background:#B71C1C; color:#fff; border-radius:50%;
      width:16px; height:16px; font-size:0.65rem; font-weight:bold;
      display:inline-flex; align-items:center; justify-content:center;
      margin-left:4px; vertical-align:middle; }
    @media(max-width:768px) {
      .msg-layout { grid-template-columns:1fr; grid-template-rows:auto 1fr; }
      .msg-sidebar { height:250px; border-right:none; border-bottom:1px solid #222; }
    }
  </style>
</head>
<body class="dashboard-body">

  <header class="dash-header">
    <div>
      <h1 class="portal-title small">Tha Artist Portal</h1>
      <p style="color:#888; font-size:0.85rem;">Messages</p>
    </div>
    <div style="display:flex; gap:10px;">
      <a href="dashboard.html" class="update-profile-btn"
         style="text-decoration:none; display:flex; align-items:center;">
         &#8592; Dashboard</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="msg-layout">

    <!-- SIDEBAR -->
    <div class="msg-sidebar">
      <div class="msg-tabs">
        <button class="msg-tab active" id="tabConvBtn"
          onclick="switchMsgTab('conversations')">
          Conversations
          <span id="convBadge" class="tab-badge" style="display:none">0</span>
        </button>
        <button class="msg-tab" id="tabReqBtn"
          onclick="switchMsgTab('requests')">
          Requests
          <span id="reqBadge" class="tab-badge" style="display:none">0</span>
        </button>
      </div>

      <!-- Conversations tab -->
      <div id="tabConversations" class="tab-content-msg active">
        <div id="convList">
          <div class="empty-sidebar">Loading...</div>
        </div>
      </div>

      <!-- Requests tab -->
      <div id="tabRequests" class="tab-content-msg">
        <div id="reqList">
          <div class="empty-sidebar">Loading...</div>
        </div>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div class="chat-panel" id="chatPanel">
      <div class="no-conv">
        <span style="font-size:2rem;">&#128172;</span>
        <span>Select a conversation to start messaging</span>
        <span style="font-size:0.8rem; color:#444;">
          You can only message accepted connections</span>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
  <footer style="text-align:center; padding:10px; color:#333; font-size:0.7rem;">
    &copy; 2026 B.B.A LLC. All Rights Reserved.
  </footer>
</body>
</html>
