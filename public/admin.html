<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin -- Tha Artist Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-container { max-width: 900px; margin: 40px auto; padding: 0 24px; }
    .admin-login { max-width: 420px; margin: 80px auto; background: #1a1a1a;
      border: 1px solid #B8860B; border-radius: 12px; padding: 40px; }
    .pending-card { background: #1a1a1a; border: 1px solid #333;
      border-left: 4px solid #D4AF37; border-radius: 8px;
      padding: 20px 24px; margin-bottom: 16px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .artist-info { flex: 1; }
    .artist-info h3 { color: #D4AF37; margin-bottom: 4px; }
    .artist-info p { color: #888; font-size: 0.9rem; }
    .action-btns { display: flex; gap: 10px; }
    .approve-btn { padding: 8px 20px; background: #1B5E20; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .approve-btn:hover { background: #2E7D32; }
    .reject-btn { padding: 8px 20px; background: #B71C1C; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .reject-btn:hover { background: #C62828; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 0.78rem; font-weight: bold; margin-left: 8px; }
    .badge-pending  { background: #7B5900; color: #FFD54F; }
    .badge-approved { background: #1B5E20; color: #A5D6A7; }
    .badge-rejected { background: #B71C1C; color: #FFCDD2; }
    .empty-msg { color: #555; font-style: italic; padding: 24px 0; text-align: center; }
    .admin-header { display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 28px; border-bottom: 2px solid #B8860B; padding-bottom: 16px; }
    .admin-header h2 { color: #D4AF37; }
  </style>
</head>
<body>


  <!-- ADMIN LOGIN -->
  <div id="adminLoginSection" class="admin-login">
    <h1 class="portal-title" style="margin-bottom:24px">Admin Panel</h1>
    <input type="password" id="adminKeyInput" placeholder="Enter Admin Key">
    <button class="gold-btn" onclick="adminLogin()">Enter</button>
    <p id="adminLoginMsg" class="msg"></p>
  </div>


  <!-- ADMIN DASHBOARD (hidden until login) -->
  <div id="adminPanel" class="admin-container" style="display:none">
    <div class="admin-header">
      <div>
        <h2 id="adminPanelTitle">Pending Registrations</h2>
        <p style="color:#888;font-size:0.9rem">Review and approve or reject artist signups</p>
      </div>
      <div style="display:flex; gap:10px; align-items:center;">
        <button class="update-profile-btn" onclick="switchAdminTab('pending')" id="tabPending">Registrations</button>
        <button class="update-profile-btn" onclick="switchAdminTab('data')" id="tabData">Data Entry</button>
        <button class="logout-btn" onclick="adminLogout()">Logout</button>
      </div>
    </div>
    <div id="pendingList"></div>
  </div>


  <script>
    let adminKey = "";


    function adminLogin() {
      const key = document.getElementById("adminKeyInput").value.trim();
      if (!key) { document.getElementById("adminLoginMsg").textContent = "Please enter the admin key."; return; }
      adminKey = key;
      loadPending();
    }


    function adminLogout() {
      adminKey = "";
      document.getElementById("adminPanel").style.display = "none";
      document.getElementById("adminLoginSection").style.display = "block";
      document.getElementById("adminKeyInput").value = "";
    }


    async function loadPending() {
      try {
        const res  = await fetch("/api/admin/pending", { headers: { "x-admin-key": adminKey } });
        if (res.status === 403) {
          document.getElementById("adminLoginMsg").textContent = "Incorrect admin key.";
          return;
        }
        const data = await res.json();
        document.getElementById("adminLoginSection").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        const list = document.getElementById("pendingList");
        if (!data.length) {
          list.innerHTML = "<p class=empty-msg>No pending registrations right now.</p>";
          return;
        }
        list.innerHTML = data.map(a =>
          "<div class=pending-card id=card-" + a.Staging_ID + ">" +
          "<div class=artist-info>" +
          "<h3>" + a.Artist_Name + " <span class='badge badge-pending'>Pending</span></h3>" +
          "<p>" + a.Artist_Email + "</p>" +
          "<p style='color:#555;font-size:0.8rem'>Submitted: " + new Date(a.Submitted_At).toLocaleString() + "</p>" +
          "</div>" +
          "<div class=action-btns>" +
          "<button class=approve-btn onclick='approve(" + a.Staging_ID + ")'>Approve</button>" +
          "<button class=reject-btn  onclick='reject("  + a.Staging_ID + ")'>Reject</button>" +
          "</div></div>"
        ).join("");
      } catch (e) {
        document.getElementById("adminLoginMsg").textContent = "Could not connect. Check your internet.";
      }
    }

async function approve(id) {
  if (!confirm("Approve this artist?")) return;
  const btn = document.querySelector(`#card-${id} .approve-btn`);
  btn.disabled = true;
  btn.textContent = "Processing...";
  const res = await fetch("/api/admin/approve/" + id, {
    method: "POST", headers: { "x-admin-key": adminKey }
  });
  const data = await res.json();
  if (res.ok) {
    const card = document.getElementById("card-" + id);
    card.style.borderLeftColor = "#2E7D32";
    card.querySelector(".action-btns").innerHTML = "<span class='badge badge-approved'>Approved</span>";
  } else { 
    btn.disabled = false;
    btn.textContent = "Approve";
    alert(data.message); 
  }
}


    async function reject(id) {
      const reason = prompt("Reason for rejection (optional):");
      const res = await fetch("/api/admin/reject/" + id, {
        method: "POST",
        headers: { "x-admin-key": adminKey, "Content-Type": "application/json" },
        body: JSON.stringify({ reason: reason || "No reason given" })
      });
      const data = await res.json();
      if (res.ok) {
        const card = document.getElementById("card-" + id);
        card.style.borderLeftColor = "#B71C1C";
        card.querySelector(".action-btns").innerHTML = "<span class='badge badge-rejected'>Rejected</span>";
      } else { alert(data.message); }
    }

// ── Admin Data Entry ─────────────────────────────────────────────
async function loadArtistDropdown(selectId) {
  const res    = await fetch("/api/admin/artists", { headers: { "x-admin-key": adminKey } });
  const data   = await res.json();
  const select = document.getElementById(selectId);
  select.innerHTML = "<option value=''>-- Select Artist --</option>" +
    data.map(a => "<option value='" + a.Artist_ID + "'>" + a.Artist_Name + "</option>").join("");
}

async function adminAddSong() {
  const msg = document.getElementById("adminSongMsg");
  const payload = {
    artistId:      document.getElementById("aSongArtist").value,
    songName:      document.getElementById("aSongName").value.trim(),
    album:         document.getElementById("aSongAlbum").value.trim(),
    releaseDate:   document.getElementById("aSongDate").value,
    duration:      document.getElementById("aSongDuration").value.trim(),
    isrc:          document.getElementById("aSongISRC").value.trim(),
    featuredArtist:document.getElementById("aSongFeatured").value.trim(),
    writersCredit: document.getElementById("aSongWriters").value.trim(),
    producerName:  document.getElementById("aSongProducer").value.trim()
  };
  if (!payload.artistId || !payload.songName) {
    msg.style.color = "#f44336";
    msg.textContent = "Artist and song name are required.";
    return;
  }
  const res  = await fetch("/api/admin/songs", {
    method: "POST",
    headers: { "x-admin-key": adminKey, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  msg.style.color = res.ok ? "#4CAF50" : "#f44336";
  msg.textContent = data.message;
}

async function adminAddStream() {
  const msg = document.getElementById("adminStreamMsg");
  const payload = {
    artistId:    document.getElementById("aStreamArtist").value,
    platform:    document.getElementById("aStreamPlatform").value.trim(),
    streamCount: parseInt(document.getElementById("aStreamCount").value),
    dateRecorded:document.getElementById("aStreamDate").value
  };
  if (!payload.artistId || !payload.platform || !payload.streamCount) {
    msg.style.color = "#f44336";
    msg.textContent = "Artist, platform and stream count are required.";
    return;
  }
  const res  = await fetch("/api/admin/streams", {
    method: "POST",
    headers: { "x-admin-key": adminKey, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  msg.style.color = res.ok ? "#4CAF50" : "#f44336";
  msg.textContent = data.message;
}

async function adminAddRoyalty() {
  const msg = document.getElementById("adminRoyaltyMsg");
  const payload = {
    artistId:    document.getElementById("aRoyaltyArtist").value,
    platform:    document.getElementById("aRoyaltyPlatform").value.trim(),
    labelName:   document.getElementById("aRoyaltyLabel").value.trim(),
    amount:      parseFloat(document.getElementById("aRoyaltyAmount").value),
    paymentDate: document.getElementById("aRoyaltyDate").value,
    status:      document.getElementById("aRoyaltyStatus").value
  };
  if (!payload.artistId || !payload.amount) {
    msg.style.color = "#f44336";
    msg.textContent = "Artist and amount are required.";
    return;
  }
  const res  = await fetch("/api/admin/royalties", {
    method: "POST",
    headers: { "x-admin-key": adminKey, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  msg.style.color = res.ok ? "#4CAF50" : "#f44336";
  msg.textContent = data.message;
}

async function adminAddContract() {
  const msg = document.getElementById("adminContractMsg");
  const payload = {
    artistId:      document.getElementById("aContractArtist").value,
    labelName:     document.getElementById("aContractLabel").value.trim(),
    dealType:      document.getElementById("aContractDeal").value.trim(),
    artistPct:     parseFloat(document.getElementById("aContractArtistPct").value  || 0),
    managerPct:    parseFloat(document.getElementById("aContractManagerPct").value || 0),
    labelPct:      parseFloat(document.getElementById("aContractLabelPct").value   || 0),
    artistLawyer:  document.getElementById("aContractArtistLawyer").value.trim(),
    managerLawyer: document.getElementById("aContractManagerLawyer").value.trim(),
    startDate:     document.getElementById("aContractStart").value,
    endDate:       document.getElementById("aContractEnd").value
  };
  if (!payload.artistId || !payload.labelName) {
    msg.style.color = "#f44336";
    msg.textContent = "Artist and label name are required.";
    return;
  }
  const res  = await fetch("/api/admin/contracts", {
    method: "POST",
    headers: { "x-admin-key": adminKey, "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  msg.style.color = res.ok ? "#4CAF50" : "#f44336";
  msg.textContent = data.message;
}


function switchAdminTab(tab) {
  if (tab === "data") {
    document.getElementById("pendingList").style.display    = "none";
    document.getElementById("adminDataSection").style.display = "block";
    document.getElementById("adminPanelTitle").textContent  = "Data Entry";
    loadArtistDropdown("aSongArtist");
    loadArtistDropdown("aStreamArtist");
    loadArtistDropdown("aRoyaltyArtist");
    loadArtistDropdown("aContractArtist");
  } else {
    document.getElementById("pendingList").style.display    = "block";
    document.getElementById("adminDataSection").style.display = "none";
    document.getElementById("adminPanelTitle").textContent  = "Pending Registrations";
  }
}

  </script>

<!-- ADMIN DATA ENTRY SECTION -->
<div id="adminDataSection" style="display:none">
  <div class="admin-container">

    <!-- ADD SONG -->
    <div style="background:#1a1a1a; border:1px solid #333; border-left:4px solid #D4AF37; border-radius:8px; padding:24px; margin-bottom:24px;">
      <h3 style="color:#D4AF37; margin-bottom:16px;">Add Song for Artist</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <select id="aSongArtist" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
          <option value="">-- Select Artist --</option>
        </select>
        <input id="aSongName"     placeholder="Song Name *"          style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongAlbum"    placeholder="Album"                style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongDate"     placeholder="Release Date" type="date" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongDuration" placeholder="Duration (e.g. 3:45)" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongISRC"     placeholder="ISRC Code"            style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongFeatured" placeholder="Featured Artist"      style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongWriters"  placeholder="Writers Credit"       style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aSongProducer" placeholder="Producer Name"        style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
      </div>
      <p id="adminSongMsg" style="margin-top:12px; font-size:0.9rem;"></p>
      <button class="approve-btn" style="margin-top:16px; width:100%;" onclick="adminAddSong()">Add Song</button>
    </div>

    <!-- ADD STREAMS -->
    <div style="background:#1a1a1a; border:1px solid #333; border-left:4px solid #1565C0; border-radius:8px; padding:24px; margin-bottom:24px;">
      <h3 style="color:#42A5F5; margin-bottom:16px;">Add Stream Data</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <select id="aStreamArtist" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
          <option value="">-- Select Artist --</option>
        </select>
        <input id="aStreamPlatform" placeholder="Platform (e.g. Spotify)" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aStreamCount"    placeholder="Stream Count" type="number" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aStreamDate"     placeholder="Date Recorded" type="date"  style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
      </div>
      <p id="adminStreamMsg" style="margin-top:12px; font-size:0.9rem;"></p>
      <button class="approve-btn" style="margin-top:16px; width:100%;" onclick="adminAddStream()">Add Stream Data</button>
    </div>

    <!-- ADD ROYALTY -->
    <div style="background:#1a1a1a; border:1px solid #333; border-left:4px solid #2E7D32; border-radius:8px; padding:24px; margin-bottom:24px;">
      <h3 style="color:#66BB6A; margin-bottom:16px;">Add Royalty Payment</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <select id="aRoyaltyArtist" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
          <option value="">-- Select Artist --</option>
        </select>
        <input id="aRoyaltyPlatform" placeholder="Platform"       style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aRoyaltyLabel"    placeholder="Label Name"     style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aRoyaltyAmount"   placeholder="Amount ($)" type="number" step="0.01" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aRoyaltyDate"     placeholder="Payment Date" type="date" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <select id="aRoyaltyStatus" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
          <option value="Pending">Pending</option>
          <option value="Paid">Paid</option>
          <option value="Processing">Processing</option>
        </select>
      </div>
      <p id="adminRoyaltyMsg" style="margin-top:12px; font-size:0.9rem;"></p>
      <button class="approve-btn" style="margin-top:16px; width:100%;" onclick="adminAddRoyalty()">Add Royalty Payment</button>
    </div>

    <!-- ADD CONTRACT -->
    <div style="background:#1a1a1a; border:1px solid #333; border-left:4px solid #7B1FA2; border-radius:8px; padding:24px; margin-bottom:24px;">
      <h3 style="color:#CE93D8; margin-bottom:16px;">Add Contract</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <select id="aContractArtist" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee; grid-column:1/-1;">
          <option value="">-- Select Artist --</option>
        </select>
        <input id="aContractLabel"         placeholder="Label Name"       style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractDeal"          placeholder="Deal Type"        style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractArtistPct"     placeholder="Artist %"    type="number" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractManagerPct"    placeholder="Manager %"   type="number" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractLabelPct"      placeholder="Label %"     type="number" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractArtistLawyer"  placeholder="Artist Lawyer"    style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractManagerLawyer" placeholder="Manager Lawyer"   style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractStart"         placeholder="Start Date" type="date" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
        <input id="aContractEnd"           placeholder="End Date"   type="date" style="background:#222; border:1px solid #444; border-radius:6px; padding:10px; color:#eee;">
      </div>
      <p id="adminContractMsg" style="margin-top:12px; font-size:0.9rem;"></p>
      <button class="approve-btn" style="margin-top:16px; width:100%;" onclick="adminAddContract()">Add Contract</button>
    </div>

  </div>
</div>

</body>
</html>
