<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Tha Artist Portal</title>
<link rel="stylesheet" href="style.css"/>
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    padding: 24px;
  }
  .reset-card {
    background: #111;
    border: 1px solid #B8860B;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .reset-card h1 {
    color: #D4AF37;
    font-size: 1.6rem;
    margin: 0;
    text-align: center;
  }
  .reset-card p {
    color: #888;
    font-size: 0.875rem;
    text-align: center;
    margin: 0;
  }
  .reset-input {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #eee;
    padding: 12px 16px;
    font-size: 0.95rem;
    outline: none;
    width: 100%;
    box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .reset-input:focus { border-color: #B8860B; }
  .reset-btn {
    background: #B8860B;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
    transition: opacity 0.15s;
  }
  .reset-btn:hover { opacity: 0.85; }
  #resetMsg {
    font-size: 0.85rem;
    text-align: center;
    min-height: 20px;
  }
</style>
</head>
<body>
<div class="reset-card">
  <h1>Tha Artist Portal</h1>
  <p>Enter your new password below.</p>
  <input type="password" id="newPass" class="reset-input" placeholder="New password (min 8 characters)"/>
  <input type="password" id="confirmPass" class="reset-input" placeholder="Confirm new password"/>
  <p id="resetMsg"></p>
  <button class="reset-btn" onclick="submitReset()">Reset Password</button>
  <a href="index.html" style="color:#666; font-size:0.8rem; text-align:center; text-decoration:none;">
    Back to Login
  </a>
</div>

<script>
function getTokenFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token');
}

async function submitReset() {
  const token   = getTokenFromURL();
  const newPass = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const msg     = document.getElementById('resetMsg');

  if (!token) {
    msg.style.color = '#f44336';
    msg.textContent = 'Invalid reset link. Please request a new one.';
    return;
  }
  if (!newPass || newPass.length < 8) {
    msg.style.color = '#f44336';
    msg.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (newPass !== confirm) {
    msg.style.color = '#f44336';
    msg.textContent = 'Passwords do not match.';
    return;
  }

  try {
    const res  = await fetch('/api/reset-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, newPassword: newPass })
    });
    const data = await res.json();
    if (res.ok) {
      msg.style.color = '#4CAF50';
      msg.textContent = 'Password reset! Redirecting to login...';
      setTimeout(() => window.location.href = 'index.html', 2000);
    } else {
      msg.style.color = '#f44336';
      msg.textContent = data.message || 'Reset failed. Try requesting a new link.';
    }
  } catch {
    msg.style.color = '#f44336';
    msg.textContent = 'Something went wrong. Try again.';
  }
}
</script>
</body>
</html>
