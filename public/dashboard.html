<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard -- Tha Artist Portal</title>
  <link rel="stylesheet" href="style.css">

<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TAP">
<link rel="apple-touch-icon" href="/icon-512.png">
<meta name="theme-color" content="#B8860B">

</head>
<body class="dashboard-body">


  <header class="dash-header">
    <div>
      <h1 class="portal-title small">Tha Artist Portal</h1>
      <p id="welcomeMsg" class="welcome-text">Loading...</p>
    </div>
    <button class="update-profile-btn" onclick="openProfileModal()">Update Profile</button>
    <button class="logout-btn" onclick="logout()">Logout</button>  </header>


  <main class="dash-main">


    <!-- STREAMS -->
    <section class="dash-section">
      <h2 class="section-title">Streams by Platform</h2>
      <div id="streamsContainer" class="cards-row"></div>
    </section>


    <!-- ROYALTIES -->
    <section class="dash-section">
      <h2 class="section-title">Royalty Payments</h2>
      <div class="table-wrap">
        <table id="royaltiesTable">
          <thead><tr>
            <th>Platform</th><th>Label</th>
            <th>Amount</th><th>Date</th><th>Status</th>
          </tr></thead>
          <tbody id="royaltiesBody"></tbody>
        </table>
      </div>
    </section>


    <!-- SONGS -->
    <section class="dash-section">
      <h2 class="section-title">Song Catalog</h2>
      <div class="table-wrap">
        <table id="songsTable">
          <thead><tr>
            <th>Song</th><th>Album</th>
            <th>Released</th><th>Duration</th><th>ISRC</th>
          </tr></thead>
          <tbody id="songsBody"></tbody>
        </table>
      </div>
    </section>


    <!-- CONTRACTS -->
    <section class="dash-section">
      <h2 class="section-title">Contract Summary</h2>
      <div id="contractsContainer" class="cards-row"></div>
    </section>


  </main>

  <!-- PROFILE MODAL -->
<div id="profileModal" class="modal-overlay">
  <div class="modal-box">
    <h2>Update Your Profile</h2>
    <div class="modal-grid">

      <p class="modal-divider">Account Info</p>
      <input class="full-width" type="text"  id="updName"  placeholder="Artist Name">
      <input class="full-width" type="email" id="updEmail" placeholder="Email Address">

      <p class="modal-divider">Contact & Location</p>
      <input type="text" id="updPhone" placeholder="Phone Number">
      <input type="text" id="updCity"  placeholder="City">
      <input class="full-width" type="text" id="updState" placeholder="State">
      <input class="full-width" type="text" id="updGenre" placeholder="Primary Genre">

      <p class="modal-divider">Social & Streaming Links</p>
      <input type="text" id="updInstagram" placeholder="Instagram URL">
      <input type="text" id="updTikTok"    placeholder="TikTok URL">
      <input type="text" id="updSpotify"   placeholder="Spotify URL">
      <input type="text" id="updApple"     placeholder="Apple Music URL">
      <input class="full-width" type="text" id="updYouTube" placeholder="YouTube URL">

    </div>
    <p id="updMsg" class="msg" style="margin-top:12px"></p>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeProfileModal()">Cancel</button>
      <button class="gold-btn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<script src="app.js"></script>

  <script src="app.js"></script>
</body>
</html>
